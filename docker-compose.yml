services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clawpanel-backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GATEWAY_URL=ws://host.docker.internal:18789
      - GATEWAY_PASSWORD=clawpanel-secure-password
      - JWT_SECRET=${JWT_SECRET:-clawpanel-secret-change-in-production}
      - JWT_ACCESS_TTL=15m
      - JWT_REFRESH_TTL=7d
      - SQLITE_PATH=/data/clawpanel.db
      - RATE_LIMIT_WINDOW=60000
      - RATE_LIMIT_MAX=100
    volumes:
      - backend-data:/data
      - /root/.openclaw:/root/.openclaw:ro
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    networks:
      - clawpanel-network
      - gateway-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clawpanel-frontend
    environment:
      - NODE_ENV=production
      - VITE_API_URL=/api
      - VITE_WS_URL=/ws
    restart: unless-stopped
    networks:
      - clawpanel-network

  nginx:
    image: nginx:alpine
    container_name: clawpanel-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - clawpanel-network

volumes:
  backend-data:

networks:
  clawpanel-network:
    driver: bridge
  gateway-network:
    name: gateway-network
    driver: bridge
