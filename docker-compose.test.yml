version: '3.8'

services:
  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    environment:
      NODE_ENV: test
      JWT_SECRET: test-secret-key
      SQLITE_PATH: ":memory:"
    volumes:
      - ./backend:/app
      - /app/node_modules
    working_dir: /app
    command: npm test

  backend-test-coverage:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    environment:
      NODE_ENV: test
      JWT_SECRET: test-secret-key
      SQLITE_PATH: ":memory:"
    volumes:
      - ./backend:/app
      - ./test-results:/app/coverage
      - /app/node_modules
    working_dir: /app
    command: npm run test:coverage
